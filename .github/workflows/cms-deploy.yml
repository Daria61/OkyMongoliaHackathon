name: Deploy CMS to AWS ECR & Fargate
on:
  push:
    paths:
      - 'packages/cms/**'
      - '.github/workflows/cms-deploy.yml'
jobs:
  build-and-deploy:
      runs-on: ubuntu-latest
      env:
        AWS_REGION: ap-northeast-1
        ECR_REPOSITORY: 258530535561.dkr.ecr.ap-northeast-1.amazonaws.com/okymn/cms
        CONTAINER_PORT: 5000
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}
        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2
      # ...existing code...
        - name: Deploy to ECS Fargate
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: .github/workflows/cms-task-def.json
            service: okymn-cms-service
            cluster: okymn-cluster
            wait-for-service-stability: true
