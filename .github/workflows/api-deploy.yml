name: Deploy API to AWS ECR & Fargatesd
on:
  push:
    paths:
      - 'packages/api/**'
      - '.github/workflows/api-deploy.yml'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-1
      ECR_REPOSITORY: 258530535561.dkr.ecr.ap-northeast-1.amazonaws.com/okymn/api
      CONTAINER_PORT: 3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
    # ...existing code...
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: .github/workflows/api-task-def.json
          service: okymn-api-service
          cluster: okymn-cluster
          wait-for-service-stability: true
